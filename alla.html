<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllergiePilot 1.1 (v1.9.1.5)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0f1a0f; --surface: #172317; --surface2: #1e2e1e; --border: #2a3d2a;
--text: #d4e8d0; --text2: #7fa87a; --text3: #4a6b46; --accent: #5dba52;
--warn-0: #3a8c35; --warn-1: #b8b800; --warn-2: #d97c00; --warn-3: #c83232; --warn-4: #8b0000;
--card-r: 14px; --font-serif: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.5; }
header { padding: 20px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #0a120a 0%, var(--bg) 100%); }
.logo { font-family: var(--font-serif); font-size: 24px; color: var(--accent); }
nav { display: flex; gap: 5px; padding: 10px 15px; border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--bg); position: sticky; top: 0; z-index: 10; }
nav button { background: none; border: none; color: var(--text3); font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; padding: 8px 12px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
.section { display: none; } .section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 18px; margin-bottom: 15px; }
.card-title { font-size: 10px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; letter-spacing: 1px; }
.warn-banner { border-radius: var(--card-r); padding: 20px; margin-bottom: 20px; border: 1px solid transparent; transition: 0.3s; }
.wl-0 { background: #1a2e18; border-color: var(--warn-0); }
.wl-2 { background: #2a1800; border-color: var(--warn-2); }
.wl-4 { background: #200000; border-color: var(--warn-4); }
.loc-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 20px; }
.sym-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sym-btn { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text3); cursor: pointer; text-align: left; }
.sym-btn.an { background: #1e3a18; border-color: var(--accent); color: #a0e896; }
.btn { background: var(--accent); color: #0a1a0a; border: none; border-radius: 8px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; font-family: var(--font-mono); }
.entry-item { border-bottom: 1px solid var(--border); padding: 15px 0; }
.pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); margin: 2px 4px 2px 0; }
.pollen-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.pollen-fill { height: 100%; background: var(--accent); transition: width 0.5s; }
.search-res { padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; background: var(--surface); }
</style>
</head>
<body>

<header><div class="logo">Allergie<span>Pilot</span> 1.9.1.5</div></header>

<nav id="mainNav">
<button class="active" onclick="showTab('heute')">Heute</button>
<button onclick="showTab('eintrag')">Symptome</button>
<button onclick="showTab('tagebuch')">Tagebuch</button>
<button onclick="showTab('muster')">Muster</button>
</nav>

<main>
<div class="section active" id="tab-heute">
<div id="warnBanner" class="warn-banner wl-0">
<div id="warnLevel" style="font-family:var(--font-serif); font-size:28px">Bereit</div>
<div id="warnSub" style="font-size:12px">Wähle einen Ort für die Prognose.</div>
</div>
<div class="loc-bar">
<div style="display:flex; justify-content:space-between; margin-bottom:8px">
<span id="locLabel">📍 Ort suchen</span>
<button onclick="getLocation()" style="background:none; border:none; cursor:pointer; font-size:16px">🎯</button>
</div>
<input id="cityInput" type="text" placeholder="PLZ oder Stadt..." oninput="searchCityDebounced()" style="width:100%; padding:10px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; outline:none">
<div id="cityResults"></div>
</div>
<div id="pollenListe"></div>
</div>

<div class="section" id="tab-eintrag">
<div class="card">
<div class="card-title">Wie geht es dir?</div>
<div class="sym-grid">
<button class="sym-btn" id="sb-nase" onclick="toggleSym('nase')">👃 Nase</button>
<button class="sym-btn" id="sb-augen" onclick="toggleSym('augen')">👁️ Augen</button>
<button class="sym-btn" id="sb-atem" onclick="toggleSym('atem')">🫁 Atem</button>
<button class="sym-btn" id="sb-haut" onclick="toggleSym('haut')">🖐️ Haut</button>
</div>
<textarea id="note" style="width:100%; margin-top:15px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:8px; font-family:inherit" placeholder="Optionale Notiz..."></textarea>
<button class="btn" style="margin-top:15px" onclick="saveEntry()">Eintrag speichern</button>
</div>
</div>

<div class="section" id="tab-tagebuch">
<div class="card" id="diaryList"></div>
</div>

<div class="section" id="tab-muster">
<div class="card" id="patternResults"></div>
</div>
</main>

<script>
let state = {
lat: null, lon: null, loc: 'Unbekannt', pc: '',
pollen: null, entries: [],
activeSyms: { nase:false, augen:false, atem:false, haut:false }
};

const POLLEN_MAP = {
alder_pollen:'Erle', birch_pollen:'Birke', grass_pollen:'Gräser',
mugwort_pollen:'Beifuß', olive_pollen:'Olive', ragweed_pollen:'Ragweed'
};

function init() {
// RETTUNGS-LOGIK: Versuche verschiedene Keys zu laden
const legacyData = localStorage.getItem('ap_entries') || localStorage.getItem('entries') || '[]';
state.entries = JSON.parse(legacyData);
const lastLoc = JSON.parse(localStorage.getItem('ap_city'));
if (lastLoc) {
selectCity(lastLoc.lat, lastLoc.lon, lastLoc.name, lastLoc.pc);
}
renderDiary();
}

// LOCATION
let sTimeout;
function searchCityDebounced() {
clearTimeout(sTimeout);
sTimeout = setTimeout(async () => {
const q = document.getElementById('cityInput').value;
if (q.length < 2) return;
try {
const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&addressdetails=1&limit=3`);
const d = await r.json();
document.getElementById('cityResults').innerHTML = d.map(i => {
const city = i.address.city || i.address.town || i.address.village || i.display_name.split(',')[0];
return `<div class="search-res" onclick="selectCity(${i.lat}, ${i.lon}, '${city}', '${i.address.postcode||''}')">
${i.address.postcode||''} ${city}
</div>`;
}).join('');
} catch(e) { console.error(e); }
}, 500);
}

async function selectCity(lat, lon, name, pc) {
state.lat = lat; state.lon = lon; state.loc = name; state.pc = pc;
document.getElementById('locLabel').innerText = `📍 ${pc} ${name}`;
document.getElementById('cityResults').innerHTML = '';
document.getElementById('cityInput').value = '';
localStorage.setItem('ap_city', JSON.stringify({lat, lon, name, pc}));
try {
const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen&timezone=auto`);
state.pollen = await r.json();
renderToday();
} catch(e) { console.error(e); }
}

function renderToday() {
if (!state.pollen) return;
const idx = new Date().getHours();
let html = '<div class="card-title">Alle aktuellen Pollen</div>';
let max = 0;

Object.keys(POLLEN_MAP).forEach(k => {
const val = state.pollen.hourly[k][idx] || 0;
max = Math.max(max, val);
html += `
<div style="margin-bottom:12px">
<div style="display:flex; justify-content:space-between; font-size:12px">
<span>${POLLEN_MAP[k]}</span><span style="color:var(--text2)">${Math.round(val)}</span>
</div>
<div class="pollen-bar"><div class="pollen-fill" style="width:${Math.min(100, val/2)}%; background:${val > 50 ? 'var(--warn-2)' : 'var(--accent)'}"></div></div>
</div>`;
});
document.getElementById('pollenListe').innerHTML = html;
const banner = document.getElementById('warnBanner');
if (max < 10) { banner.className='warn-banner wl-0'; document.getElementById('warnLevel').innerText='Gering'; }
else if (max < 100) { banner.className='warn-banner wl-2'; document.getElementById('warnLevel').innerText='Mäßig'; }
else { banner.className='warn-banner wl-4'; document.getElementById('warnLevel').innerText='Hoch'; }
document.getElementById('warnSub').innerText = `Spitzenwert: ${Math.round(max)} (Stunde: ${idx}:00)`;
}

// DIARY & LOGIC
function saveEntry() {
const idx = new Date().getHours();
const currentPollen = {};
if (state.pollen) {
Object.keys(POLLEN_MAP).forEach(k => {
currentPollen[POLLEN_MAP[k]] = Math.round(state.pollen.hourly[k][idx] || 0);
});
}

const newEntry = {
t: new Date().toISOString(),
loc: `${state.pc} ${state.loc}`.trim() || 'Unbekannt',
syms: {...state.activeSyms},
pollen: currentPollen,
note: document.getElementById('note').value
};

state.entries.unshift(newEntry);
localStorage.setItem('ap_entries', JSON.stringify(state.entries));
// UI Reset
state.activeSyms = { nase:false, augen:false, atem:false, haut:false };
document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('an'));
document.getElementById('note').value = '';
alert("Eintrag erfolgreich gespeichert!");
showTab('tagebuch');
}

function renderDiary() {
const container = document.getElementById('diaryList');
if (state.entries.length === 0) {
container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text3)">Noch keine Einträge vorhanden.</div>';
return;
}

container.innerHTML = state.entries.map(e => `
<div class="entry-item">
<div style="display:flex; justify-content:space-between; font-size:10px; color:var(--text3); margin-bottom:5px">
<span>${new Date(e.t).toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'2-digit'})}</span>
<span>📍 ${e.loc}</span>
</div>
<div style="margin-bottom:8px">${Object.entries(e.syms).filter(s=>s[1]).map(s=>`<span class="pill">${s[0].toUpperCase()}</span>`).join('')}</div>
<div style="font-size:11px; opacity:0.8">
${Object.entries(e.pollen || {}).filter(p=>p[1]>5).map(p=>`<b>${p[0]}</b>: ${p[1]}`).join(' · ') || 'Keine Belastung'}
</div>
${e.note ? `<div style="font-size:11px; font-style:italic; margin-top:5px; color:var(--text2)">"${e.note}"</div>` : ''}
</div>
`).join('');
}

function renderMuster() {
const container = document.getElementById('patternResults');
const sympEntries = state.entries.filter(e => Object.values(e.syms).some(v => v));
if (sympEntries.length < 2) {
container.innerHTML = '<div class="card-title">Analyse</div>Sammle mindestens 2 Einträge mit Symptomen für eine Auswertung.';
return;
}

let triggers = {};
sympEntries.forEach(e => {
Object.entries(e.pollen || {}).forEach(([pName, pVal]) => {
if (pVal > 20) triggers[pName] = (triggers[pName] || 0) + 1;
});
});

let html = '<div class="card-title">Mögliche Trigger</div>';
const sorted = Object.entries(triggers).sort((a,b) => b[1] - a[1]);
if (sorted.length === 0) {
html += "Keine eindeutigen Zusammenhänge gefunden."
} else {
sorted.forEach(([name, count]) => {
const perc = Math.round((count / sympEntries.length) * 100);
html += `<div style="margin-bottom:12px">
<div style="display:flex; justify-content:space-between"><span>${name}</span> <span>${perc}%</span></div>
<div class="pollen-bar"><div class="pollen-fill" style="width:${perc}%"></div></div>
</div>`;
});
}
container.innerHTML = html;
}

function showTab(id) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
const btns = document.querySelectorAll('nav button');
if(id==='heute') btns[0].classList.add('active');
if(id==='eintrag') btns[1].classList.add('active');
if(id==='tagebuch') { btns[2].classList.add('active'); renderDiary(); }
if(id==='muster') { btns[3].classList.add('active'); renderMuster(); }
}

function toggleSym(k) {
state.activeSyms[k] = !state.activeSyms[k];
document.getElementById('sb-'+k).classList.toggle('an');
}

function getLocation() {
navigator.geolocation.getCurrentPosition(async (p) => {
const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
const d = await r.json();
selectCity(p.coords.latitude, p.coords.longitude, d.address.city || d.address.town || 'Mein Standort', d.address.postcode || '');
});
}

init();
</script>
</body>
</html>
