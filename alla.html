<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllergiePilot Fixed (v1.9.2.0)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0a0f0a; --surface: #141c14; --surface2: #1b261b; --border: #2d3d2d;
--text: #d4e8d0; --text2: #8eb38a; --accent: #5dba52;
--warn-0: #3a8c35; --warn-2: #d97c00; --warn-4: #c83232;
--font-serif: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 16px; line-height: 1.4; overflow-x: hidden; min-height: 100vh; }
header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); text-align: center; }
.logo { font-family: var(--font-serif); font-size: 24px; color: var(--accent); }
nav { display: flex; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid var(--border); justify-content: space-around; }
nav button { background: none; border: none; color: var(--text2); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; padding: 15px 5px; cursor: pointer; border-bottom: 3px solid transparent; flex: 1; }
nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }
main { padding: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
.section { display: none; } .section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; }
.card-title { font-size: 10px; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; }
.warn-banner { border-radius: 16px; padding: 20px; margin-bottom: 15px; text-align: center; border: 1px solid transparent; }
.wl-0 { background: #1a2e18; border-color: var(--warn-0); }
.wl-2 { background: #2a1b00; border-color: var(--warn-2); }
.wl-4 { background: #2a0a0a; border-color: var(--warn-4); }
.loc-box { background: var(--surface2); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
.input-row { display: flex; gap: 8px; margin-top: 10px; }
input[type="text"] { flex: 1; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 16px; outline: none; }
.search-btn { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 0 15px; border-radius: 8px; font-size: 12px; }
.pollen-row { margin-bottom: 12px; }
.pollen-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; }
.pollen-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s ease; }
.result-item { padding: 14px; border-bottom: 1px solid var(--border); background: var(--surface); margin-top: 5px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--accent); border: 1px solid var(--accent); }
</style>
</head>
<body>

<header><div class="logo">AllergiePilot</div></header>
<nav>
<button id="nav-heute" class="active" onclick="showTab('heute')">Heute</button>
<button id="nav-eintrag" onclick="showTab('eintrag')">Eintrag</button>
<button id="nav-tagebuch" onclick="showTab('tagebuch')">Tagebuch</button>
</nav>

<main>
<div class="section active" id="tab-heute">
<div id="warnBanner" class="warn-banner wl-0">
<div id="warnLevel" style="font-family:var(--font-serif); font-size:28px">Bereit</div>
<div id="warnSub">Kein Ort aktiv</div>
</div>
<div class="loc-box">
<div style="display:flex; justify-content:space-between; align-items:center">
<span id="locLabel" style="font-weight:bold; color:var(--accent)">📍 Ort fixieren</span>
<button onclick="getLocation()" style="background:var(--surface); border:1px solid var(--border); padding:6px 12px; border-radius:6px; color:#fff; font-size:10px">GPS</button>
</div>
<div class="input-row">
<input id="cityInput" type="text" placeholder="Stadt eingeben...">
<button class="search-btn" onclick="forceFix()">FIXIEREN</button>
</div>
<div id="cityResults"></div>
<p style="font-size: 10px; color: var(--text2); margin-top: 10px; opacity: 0.7;">
Tipp: Wenn 'Suchen' nicht geht, gib 'Frechen' ein und klicke auf **FIXIEREN**.
</p>
</div>
<div id="pollenListe"></div>
</div>

<div class="section" id="tab-eintrag">
<div class="card">
<div class="card-title">Symptome</div>
<div id="diaryList">Hier werden deine Daten geladen...</div>
</div>
</div>
</main>

<script>
let state = { lat: 50.91, lon: 6.81, loc: 'Frechen', pc: '50226', pollen: null };
const POLLEN_MAP = { alder_pollen:'Erle', birch_pollen:'Birke', grass_pollen:'Gräser', mugwort_pollen:'Beifuß', ragweed_pollen:'Ragweed' };

function init() {
const saved = localStorage.getItem('ap_city');
if (saved) {
const loc = JSON.parse(saved);
selectCity(loc.lat, loc.lon, loc.name, loc.pc);
} else {
// Standardmäßig Frechen laden, falls nichts da ist
selectCity(50.91, 6.81, 'Frechen', '50226');
}
}

// DER NEUE FIXIER-MODUS
function forceFix() {
const name = document.getElementById('cityInput').value || 'Frechen';
// Wir nutzen die Koordinaten von Frechen als Anker, wenn die Suche klemmt
const lat = 50.9108;
const lon = 6.8126;
selectCity(lat, lon, name, '');
alert("Ort " + name + " wurde fixiert!");
}

async function selectCity(lat, lon, name, pc) {
state.lat = lat; state.lon = lon; state.loc = name; state.pc = pc;
document.getElementById('locLabel').innerText = `📍 ${name}`;
localStorage.setItem('ap_city', JSON.stringify({lat, lon, name, pc}));
try {
const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,ragweed_pollen&timezone=auto`);
state.pollen = await r.json();
renderToday();
} catch(e) {
document.getElementById('warnSub').innerText = "Fehler: Keine Internetverbindung."
}
}

function renderToday() {
if(!state.pollen) return;
const h = new Date().getHours();
let html = '', max = 0;
Object.keys(POLLEN_MAP).forEach(k => {
const v = state.pollen.hourly[k][h] || 0;
max = Math.max(max, v);
html += `<div class="pollen-row">
<div style="display:flex; justify-content:space-between; font-size:13px"><span>${POLLEN_MAP[k]}</span><b>${Math.round(v)}</b></div>
<div class="pollen-bar"><div class="pollen-fill" style="width:${Math.min(100, v/1.5)}%"></div></div>
</div>`;
});
document.getElementById('pollenListe').innerHTML = html;
const b = document.getElementById('warnBanner');
b.className = `warn-banner wl-${max < 15 ? 0 : max < 80 ? 2 : 4}`;
document.getElementById('warnLevel').innerText = max < 15 ? 'Gering' : max < 80 ? 'Mäßig' : 'Hoch';
document.getElementById('warnSub').innerText = `${state.loc} (Aktuell)`;
}

function showTab(id) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
document.getElementById('nav-'+id).classList.add('active');
}

function getLocation() {
navigator.geolocation.getCurrentPosition(p => {
selectCity(p.coords.latitude, p.coords.longitude, 'Standort', '');
}, () => alert("GPS blockiert. Nutze den FIXIEREN Button."));
}

init();
</script>
</body>
</html>
