<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllergiePilot Pro (v1.9.1.9)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0a0f0a; --surface: #141c14; --surface2: #1b261b; --border: #2d3d2d;
--text: #d4e8d0; --text2: #8eb38a; --accent: #5dba52;
--warn-0: #3a8c35; --warn-2: #d97c00; --warn-4: #c83232;
--font-serif: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
background: var(--bg); color: var(--text); font-family: var(--font-mono);
font-size: 16px; line-height: 1.4; overflow-x: hidden; min-height: 100vh;
}

header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); text-align: center; }
.logo { font-family: var(--font-serif); font-size: 24px; color: var(--accent); }

nav {
display: flex; position: sticky; top: 0; background: var(--bg);
z-index: 100; border-bottom: 1px solid var(--border);
justify-content: space-around;
}
nav button {
background: none; border: none; color: var(--text2); font-family: var(--font-mono);
font-size: 10px; text-transform: uppercase; padding: 15px 5px; cursor: pointer;
border-bottom: 3px solid transparent; flex: 1;
}
nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }

main { padding: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
.section { display: none; }
.section.active { display: block; }

.card {
background: var(--surface); border: 1px solid var(--border);
border-radius: 16px; padding: 18px; margin-bottom: 15px;
}
.card-title { font-size: 10px; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; }

.warn-banner { border-radius: 16px; padding: 20px; margin-bottom: 15px; text-align: center; border: 1px solid transparent; }
.wl-0 { background: #1a2e18; border-color: var(--warn-0); }
.wl-2 { background: #2a1b00; border-color: var(--warn-2); }
.wl-4 { background: #2a0a0a; border-color: var(--warn-4); }

.loc-box { background: var(--surface2); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
.input-row { display: flex; gap: 8px; margin-top: 10px; }
input[type="text"] {
flex: 1; padding: 12px; background: var(--bg); border: 1px solid var(--border);
color: var(--text); border-radius: 8px; font-size: 16px; outline: none;
}
.search-btn { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 0 15px; border-radius: 8px; }

.sym-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sym-btn {
padding: 16px; border-radius: 12px; border: 1px solid var(--border);
background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 14px;
display: flex; align-items: center; justify-content: center; gap: 8px;
}
.sym-btn.an { background: #1e3a18; border-color: var(--accent); color: #fff; font-weight: bold; }

.btn-save {
background: var(--accent); color: #000; border: none; border-radius: 12px;
padding: 18px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px;
}

.pollen-row { margin-bottom: 12px; }
.pollen-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; }
.pollen-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s ease; }

.result-item {
padding: 14px; border-bottom: 1px solid var(--border); background: var(--surface);
margin-top: 5px; border-radius: 8px; cursor: pointer; font-size: 14px;
}
.entry-card { border-bottom: 1px solid var(--border); padding: 12px 0; }
.pill { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); margin: 2px 4px 0 0; }
</style>
</head>
<body>

<header><div class="logo">AllergiePilot</div></header>

<nav>
<button id="nav-heute" class="active" onclick="showTab('heute')">Heute</button>
<button id="nav-eintrag" onclick="showTab('eintrag')">Eintrag</button>
<button id="nav-tagebuch" onclick="showTab('tagebuch')">Tagebuch</button>
<button id="nav-muster" onclick="showTab('muster')">Analyse</button>
</nav>

<main>
<div class="section active" id="tab-heute">
<div id="warnBanner" class="warn-banner wl-0">
<div id="warnLevel" style="font-family:var(--font-serif); font-size:28px">Bereit</div>
<div id="warnSub" style="font-size:12px">Wähle einen Ort aus der Liste</div>
</div>
<div class="loc-box">
<div style="display:flex; justify-content:space-between; align-items:center">
<span id="locLabel" style="font-weight:bold; color:var(--accent)">📍 Ort wählen</span>
<button onclick="getLocation()" style="background:var(--surface); border:1px solid var(--border); padding:6px 12px; border-radius:6px; color:#fff; font-size:12px">🎯 GPS</button>
</div>
<div class="input-row">
<input id="cityInput" type="text" placeholder="Ort oder PLZ..." onkeydown="if(event.key==='Enter') executeSearch()">
<button class="search-btn" onclick="executeSearch()">Suchen</button>
</div>
<div id="cityResults"></div>
</div>
<div id="pollenListe"></div>
</div>

<div class="section" id="tab-eintrag">
<div class="card">
<div class="card-title">Symptome wählen</div>
<div class="sym-grid">
<button class="sym-btn" id="sb-nase" onclick="toggleSym('nase')">👃 Nase</button>
<button class="sym-btn" id="sb-augen" onclick="toggleSym('augen')">👁️ Augen</button>
<button class="sym-btn" id="sb-atem" onclick="toggleSym('atem')">🫁 Atem</button>
<button class="sym-btn" id="sb-haut" onclick="toggleSym('haut')">🖐️ Haut</button>
</div>
<textarea id="note" style="width:100%; margin-top:15px; height:80px; background:var(--bg); border:1px solid var(--border); color:#fff; padding:10px; border-radius:10px; font-family:inherit" placeholder="Notizen..."></textarea>
<button class="btn-save" onclick="saveEntry()">Eintrag Speichern</button>
</div>
</div>

<div class="section" id="tab-tagebuch">
<div class="card">
<div class="card-title">Deine Einträge</div>
<div id="diaryList"></div>
</div>
</div>

<div class="section" id="tab-muster">
<div class="card" id="patternResults"></div>
</div>
</main>

<script>
let state = { lat:null, lon:null, loc:'Unbekannt', pc:'', pollen:null, activeSyms:{nase:false, augen:false, atem:false, haut:false}};
const POLLEN_MAP = { alder_pollen:'Erle', birch_pollen:'Birke', grass_pollen:'Gräser', mugwort_pollen:'Beifuß', ragweed_pollen:'Ragweed' };

function init() {
const lastLoc = JSON.parse(localStorage.getItem('ap_city'));
if (lastLoc) selectCity(lastLoc.lat, lastLoc.lon, lastLoc.name, lastLoc.pc);
}

// SUCHE & API
async function executeSearch() {
const q = document.getElementById('cityInput').value;
if (q.length < 2) return;
const resDiv = document.getElementById('cityResults');
resDiv.innerHTML = '<div class="result-item">Suche...</div>';
try {
const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&addressdetails=1&limit=4`);
const d = await r.json();
if (d.length === 0) { resDiv.innerHTML = '<div class="result-item">Kein Ort gefunden.</div>'; return; }
resDiv.innerHTML = d.map(i => {
const name = i.address.city || i.address.town || i.address.village || i.display_name.split(',')[0];
return `<div class="result-item" onclick="selectCity(${i.lat}, ${i.lon}, '${name}', '${i.address.postcode||''}')">
<b>${i.address.postcode||''} ${name}</b><br><small>${i.address.state || ''}</small>
</div>`;
}).join('');
} catch(e) { resDiv.innerHTML = '<div class="result-item">Netzwerkfehler.</div>'; }
}

async function selectCity(lat, lon, name, pc) {
state.lat = lat; state.lon = lon; state.loc = name; state.pc = pc;
document.getElementById('locLabel').innerText = `📍 ${pc} ${name}`;
document.getElementById('cityResults').innerHTML = '';
document.getElementById('cityInput').value = '';
localStorage.setItem('ap_city', JSON.stringify({lat, lon, name, pc}));
const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,ragweed_pollen&timezone=auto`);
state.pollen = await r.json();
renderToday();
}

function renderToday() {
if(!state.pollen) return;
const h = new Date().getHours();
let html = '', max = 0;
Object.keys(POLLEN_MAP).forEach(k => {
const v = state.pollen.hourly[k][h] || 0;
max = Math.max(max, v);
html += `<div class="pollen-row">
<div style="display:flex; justify-content:space-between; font-size:13px"><span>${POLLEN_MAP[k]}</span><b>${Math.round(v)}</b></div>
<div class="pollen-bar"><div class="pollen-fill" style="width:${Math.min(100, v/1.5)}%"></div></div>
</div>`;
});
document.getElementById('pollenListe').innerHTML = html;
const b = document.getElementById('warnBanner');
b.className = `warn-banner wl-${max < 15 ? 0 : max < 80 ? 2 : 4}`;
document.getElementById('warnLevel').innerText = max < 15 ? 'Gering' : max < 80 ? 'Mäßig' : 'Hoch';
document.getElementById('warnSub').innerText = `Spitzenwert: ${Math.round(max)} in ${state.loc}`;
}

// TAGEBUCH & MUSTER
function saveEntry() {
const h = new Date().getHours();
const curP = {};
if (state.pollen) Object.keys(POLLEN_MAP).forEach(k => curP[POLLEN_MAP[k]] = Math.round(state.pollen.hourly[k][h] || 0));

const entries = JSON.parse(localStorage.getItem('ap_entries') || '[]');
entries.unshift({ t:new Date().toISOString(), loc:state.pc+' '+state.loc, syms:{...state.activeSyms}, pollen:curP, note:document.getElementById('note').value });
localStorage.setItem('ap_entries', JSON.stringify(entries));
// Reset & Redirect
state.activeSyms = {nase:false, augen:false, atem:false, haut:false};
document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('an'));
document.getElementById('note').value = '';
showTab('tagebuch');
}

function renderDiary() {
const e = JSON.parse(localStorage.getItem('ap_entries') || '[]');
document.getElementById('diaryList').innerHTML = e.length === 0 ? "Noch keine Einträge." : e.map(i => `
<div class="entry-card">
<div style="font-size:10px; color:var(--text2); display:flex; justify-content:space-between">
<span>${new Date(i.t).toLocaleDateString()}</span><span>${i.loc}</span>
</div>
<div style="margin:5px 0">${Object.entries(i.syms).filter(s=>s[1]).map(s=>`<span class="pill">${s[0].toUpperCase()}</span>`).join('')}</div>
<div style="font-size:11px; opacity:0.7">${Object.entries(i.pollen||{}).filter(p=>p[1]>5).map(p=>p[0]+':'+p[1]).join(' · ')}</div>
${i.note ? `<div style="font-size:11px; font-style:italic; margin-top:3px">"${i.note}"</div>` : ''}
</div>`).join('');
}

function renderMuster() {
const e = JSON.parse(localStorage.getItem('ap_entries') || '[]');
const symps = e.filter(i => Object.values(i.syms).some(v => v));
const res = document.getElementById('patternResults');
if (symps.length < 2) { res.innerHTML = "Sammle mehr Daten für die Trigger-Analyse." return; }

let counts = {};
symps.forEach(i => Object.entries(i.pollen||{}).forEach(([n,v]) => { if(v > 20) counts[n] = (counts[n]||0)+1; }));
let html = '<div class="card-title">Mögliche Auslöser</div>';
Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([n,c]) => {
const p = Math.round((c/symps.length)*100);
html += `<div style="margin-bottom:12px"><span>${n}</span> (${p}%)<div class="pollen-bar"><div class="pollen-fill" style="width:${p}%"></div></div></div>`;
});
res.innerHTML = html;
}

function showTab(id) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
document.getElementById('nav-'+id).classList.add('active');
if(id === 'tagebuch') renderDiary();
if(id === 'muster') renderMuster();
}

function toggleSym(k) { state.activeSyms[k] = !state.activeSyms[k]; document.getElementById('sb-'+k).classList.toggle('an'); }
function getLocation() {
navigator.geolocation.getCurrentPosition(async p => {
const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
const d = await r.json();
selectCity(p.coords.latitude, p.coords.longitude, d.address.city || d.address.town || 'Mein Ort', d.address.postcode || '');
});
}

init();
</script>
</body>
</html>
