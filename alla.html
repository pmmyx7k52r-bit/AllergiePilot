<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllergiePilot Pro (v1.9.3.0)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0a0f0a; --surface: #141c14; --surface2: #1b261b; --border: #2d3d2d;
--text: #d4e8d0; --text2: #8eb38a; --accent: #5dba52;
--warn-0: #3a8c35; --warn-2: #d97c00; --warn-4: #c83232;
--font-serif: 'DM Serif Display', serif; --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 16px; line-height: 1.4; min-height: 100vh; }
header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); text-align: center; }
.logo { font-family: var(--font-serif); font-size: 24px; color: var(--accent); }
nav { display: flex; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid var(--border); }
nav button { background: none; border: none; color: var(--text2); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; padding: 15px; flex: 1; cursor: pointer; }
nav button.active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: bold; }
main { padding: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
.section { display: none; } .section.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 15px; }
.card-title { font-size: 10px; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; }

.warn-banner { border-radius: 16px; padding: 25px; margin-bottom: 15px; text-align: center; border: 1px solid transparent; }
.wl-0 { background: #1a2e18; border-color: var(--warn-0); }
.wl-2 { background: #2a1b00; border-color: var(--warn-2); }
.wl-4 { background: #2a0a0a; border-color: var(--warn-4); }

.pollen-row { margin-bottom: 12px; }
.pollen-bar { height: 8px; background: var(--border); border-radius: 4px; margin-top: 4px; overflow: hidden; }
.pollen-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 1s ease; }

.sym-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.sym-btn { padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 14px; text-align: center; }
.sym-btn.an { background: #1e3a18; border-color: var(--accent); color: #fff; font-weight: bold; }

textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; font-family: inherit; margin-bottom: 15px; height: 80px; outline: none; }
.btn-action { background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }

.entry-item { border-bottom: 1px solid var(--border); padding: 12px 0; }
.pill { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); margin: 2px 4px 0 0; }
</style>
</head>
<body>

<header><div class="logo">AllergiePilot</div></header>

<nav>
<button id="nav-heute" class="active" onclick="showTab('heute')">Pollen</button>
<button id="nav-eintrag" onclick="showTab('eintrag')">Check</button>
<button id="nav-tagebuch" onclick="showTab('tagebuch')">Daten</button>
</nav>

<main>
<div class="section active" id="tab-heute">
<div id="warnBanner" class="warn-banner wl-0">
<div id="warnLevel" style="font-family:var(--font-serif); font-size:32px">Lade...</div>
<div id="warnSub">Region Frechen</div>
</div>
<div id="pollenListe" class="card">Abruf läuft...</div>
<div id="statusLabel" style="font-size:10px; text-align:center; opacity:0.6;">Standort fixiert: 50226 Frechen</div>
</div>

<div class="section" id="tab-eintrag">
<div class="card">
<div class="card-title">Was spürst du gerade?</div>
<div class="sym-grid">
<button class="sym-btn" id="sb-nase" onclick="toggleSym('nase')">👃 Nase</button>
<button class="sym-btn" id="sb-augen" onclick="toggleSym('augen')">👁️ Augen</button>
<button class="sym-btn" id="sb-atem" onclick="toggleSym('atem')">🫁 Atem</button>
<button class="sym-btn" id="sb-haut" onclick="toggleSym('haut')">🖐️ Haut</button>
</div>
<textarea id="note" placeholder="Notizen (z.B. Sport gemacht, anderes Essen...)"></textarea>
<button class="btn-action" onclick="saveEntry()">Eintrag Speichern</button>
</div>
</div>

<div class="section" id="tab-tagebuch">
<div class="card" id="patternResults" style="border-color: var(--accent); display:none;"></div>
<div class="card">
<div class="card-title">Historie</div>
<div id="diaryList">Keine Einträge vorhanden.</div>
</div>
<button onclick="clearData()" style="background:none; border:none; color:var(--warn-4); font-size:10px; width:100%; margin-top:20px;">Alle Daten löschen</button>
</div>
</main>

<script>
const FRECHEN = { lat: 50.9108, lon: 6.8126, name: 'Frechen' };
const POLLEN_MAP = { alder_pollen:'Erle', birch_pollen:'Birke', grass_pollen:'Gräser', mugwort_pollen:'Beifuß', ragweed_pollen:'Ambrosia' };
let state = { pollen: null, activeSyms: {nase:false, augen:false, atem:false, haut:false} };

// 1. Daten laden
async function updateData() {
try {
const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${FRECHEN.lat}&longitude=${FRECHEN.lon}&hourly=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,ragweed_pollen&timezone=auto`);
state.pollen = await r.json();
renderToday();
} catch(e) {
document.getElementById('warnLevel').innerText = "Offline"
}
}

function renderToday() {
const h = new Date().getHours();
let html = '', max = 0;
Object.keys(POLLEN_MAP).forEach(k => {
const v = state.pollen.hourly[k][h] || 0;
max = Math.max(max, v);
html += `<div class="pollen-row">
<div style="display:flex; justify-content:space-between; font-size:13px"><span>${POLLEN_MAP[k]}</span><b>${Math.round(v)}</b></div>
<div class="pollen-bar"><div class="pollen-fill" style="width:${Math.min(100, v/1.5)}%"></div></div>
</div>`;
});
document.getElementById('pollenListe').innerHTML = html;
const b = document.getElementById('warnBanner');
b.className = `warn-banner wl-${max < 15 ? 0 : max < 80 ? 2 : 4}`;
document.getElementById('warnLevel').innerText = max < 15 ? 'Gering' : max < 80 ? 'Mäßig' : 'Hoch';
document.getElementById('warnSub').innerText = `Frechen • ${h}:00 Uhr`;
}

// 2. Speichern
function toggleSym(k) {
state.activeSyms[k] = !state.activeSyms[k];
document.getElementById('sb-'+k).classList.toggle('an');
}

function saveEntry() {
const h = new Date().getHours();
const curP = {};
if (state.pollen) {
Object.keys(POLLEN_MAP).forEach(k => curP[POLLEN_MAP[k]] = Math.round(state.pollen.hourly[k][h] || 0));
}

const entries = JSON.parse(localStorage.getItem('ap_entries') || '[]');
entries.unshift({
t: new Date().toISOString(),
loc: 'Frechen',
syms: {...state.activeSyms},
pollen: curP,
note: document.getElementById('note').value
});
localStorage.setItem('ap_entries', JSON.stringify(entries));
// Reset UI
state.activeSyms = {nase:false, augen:false, atem:false, haut:false};
document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('an'));
document.getElementById('note').value = '';
showTab('tagebuch');
}

// 3. Anzeigen & Analyse
function renderDiary() {
const entries = JSON.parse(localStorage.getItem('ap_entries') || '[]');
const list = document.getElementById('diaryList');
if (entries.length === 0) {
list.innerHTML = "Noch keine Einträge."
return;
}

list.innerHTML = entries.map(e => `
<div class="entry-item">
<div style="font-size:10px; color:var(--text2); display:flex; justify-content:space-between">
<span>${new Date(e.t).toLocaleDateString()} ${new Date(e.t).getHours()}:00</span>
<span>📍 Frechen</span>
</div>
<div style="margin:5px 0">${Object.entries(e.syms).filter(s=>s[1]).map(s=>`<span class="pill">${s[0].toUpperCase()}</span>`).join('')}</div>
<div style="font-size:11px; opacity:0.7">${Object.entries(e.pollen||{}).filter(p=>p[1]>5).map(p=>p[0]+':'+p[1]).join(' · ')}</div>
${e.note ? `<div style="font-size:11px; font-style:italic; margin-top:3px; color:var(--accent)">"${e.note}"</div>` : ''}
</div>
`).join('');
renderMuster(entries);
}

function renderMuster(entries) {
const symps = entries.filter(e => Object.values(e.syms).some(v => v));
const resDiv = document.getElementById('patternResults');
if (symps.length < 2) {
resDiv.style.display = 'none';
return;
}

resDiv.style.display = 'block';
let triggers = {};
symps.forEach(e => {
Object.entries(e.pollen||{}).forEach(([name, val]) => {
if (val > 20) triggers[name] = (triggers[name] || 0) + 1;
});
});

let html = '<div class="card-title">Trigger-Analyse</div>';
const sorted = Object.entries(triggers).sort((a,b) => b[1] - a[1]);
if (sorted.length === 0) {
html += "<div style='font-size:12px'>Symptome traten bei geringer Belastung auf.</div>"
} else {
sorted.forEach(([n, c]) => {
const p = Math.round((c / symps.length) * 100);
html += `<div style="margin-bottom:8px; font-size:13px;"><b>${n}</b>: Bei ${p}% deiner Probleme aktiv</div>`;
});
}
resDiv.innerHTML = html;
}

function showTab(id) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
document.getElementById('nav-'+id).classList.add('active');
if (id === 'tagebuch') renderDiary();
}

function clearData() {
if (confirm("Wirklich alle Einträge löschen?")) {
localStorage.removeItem('ap_entries');
renderDiary();
}
}

updateData();
</script>
</body>
</html>
